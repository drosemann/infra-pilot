name: CI - Branding Assets

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'branding/**'
      - '.github/workflows/ci-branding.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'branding/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Branding Assets

    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "Checking branding assets..."
          for f in branding/assets/*; do
            if [ -f "$f" ]; then
              size=$(stat --format=%s "$f" 2>/dev/null || echo 0)
              echo "  $f ($size bytes)"
            fi
          done

      - name: Validate SVG files
        run: |
          for svg in branding/assets/*.svg; do
            if head -1 "$svg" | grep -q '<svg'; then
              echo "Valid SVG: $svg"
            else
              echo "WARNING: $svg may not be a valid SVG"
            fi
          done

      - name: Validate TypeScript files
        run: |
          if [ -f branding/BrandLogo.tsx ]; then
            echo "BrandLogo.tsx exists"
            head -5 branding/BrandLogo.tsx
          fi

name: CI - CLI Service (Python)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/cli/**'
      - 'cli/**'
      - '.github/workflows/ci-cli.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/cli/**'
      - 'cli/**'

permissions:
  contents: read

env:
  SERVICE_PATH: services/cli
  CLI_PATH: cli
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cli-service

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 ${{ env.SERVICE_PATH }} --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ${{ env.SERVICE_PATH }} --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check black formatting
        run: black --check ${{ env.SERVICE_PATH }}

      - name: Check import sorting
        run: isort --check-only ${{ env.SERVICE_PATH }}

      - name: Lint root CLI directory
        continue-on-error: true
        run: |
          flake8 ${{ env.CLI_PATH }} --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check ${{ env.CLI_PATH }}

  test:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run pytest for CLI
        run: |
          pytest tests/cli/ -q --cov=services/cli --cov-report=xml --cov-report=term-missing || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: cli-service
          name: cli-service

  security:
    runs-on: ubuntu-latest
    name: Security Checks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security check
        run: bandit -r ${{ env.SERVICE_PATH }} -f json -o bandit-report.json || true

      - name: Run Bandit on CLI
        continue-on-error: true
        run: bandit -r ${{ env.CLI_PATH }} -f json -o bandit-cli-report.json || true

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --json || true

  build:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    name: Build Service Image
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.CLI_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

name: CI - Service Core (Java)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/service-core/**'
      - '.github/workflows/ci-core.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/service-core/**'

env:
  SERVICE_PATH: services/service-core
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/service-core

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build & Test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: cd ${{ env.SERVICE_PATH }} && mvn -B clean package
      
      - name: Run tests with coverage
        run: cd ${{ env.SERVICE_PATH }} && mvn -B test jacoco:report jacoco:check
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ env.SERVICE_PATH }}/target/site/jacoco/jacoco.xml
          flags: service-core
          name: service-core-coverage

  docker:
    needs: [test]
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

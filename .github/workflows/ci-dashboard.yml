name: CI - Management Panel (TypeScript)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/management-panel/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/management-panel/**'

jobs:
  node-service:
    name: Management panel CI
    uses: ./.github/workflows/reusable-node-service.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      service-path: services/management-panel
      image-name: ${{ github.repository }}/management-panel
      run-build: true
      test-command: npm run test -- --coverage
      upload-coverage: true
      coverage-files: ./services/management-panel/coverage/coverage-final.json
      coverage-flag: dashboard
      coverage-name: dashboard-coverage

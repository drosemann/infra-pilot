name: CI - Discord Service (Node.js)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/discord-service/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/discord-service/**'

jobs:
  node-service:
    name: Discord service CI
    uses: ./.github/workflows/reusable-node-service.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      service-path: services/discord-service
      image-name: ${{ github.repository }}/discord-service

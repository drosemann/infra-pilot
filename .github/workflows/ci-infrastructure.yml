name: CI - Infrastructure as Code

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'infra/**'
      - 'infrastructure/**'
      - '.github/workflows/ci-infrastructure.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'infra/**'
      - 'infrastructure/**'

permissions:
  contents: read

jobs:
  lint-python:
    runs-on: ubuntu-latest
    name: Lint Python Infra

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install flake8 black isort

      - name: Lint infra
        continue-on-error: true
        run: |
          flake8 infra/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 infra/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          black --check infra/ || true

  validate-terraform:
    runs-on: ubuntu-latest
    name: Validate Terraform
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false || true
        continue-on-error: true

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate || true
        continue-on-error: true

      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -diff || true

  validate-prometheus:
    runs-on: ubuntu-latest
    name: Validate Prometheus Config

    steps:
      - uses: actions/checkout@v4

      - name: Check Prometheus config
        run: |
          if [ -f infrastructure/prometheus/prometheus.yml ]; then
            echo "Prometheus config exists"
            cat infrastructure/prometheus/prometheus.yml | head -20
          fi

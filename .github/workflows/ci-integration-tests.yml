name: CI - Integration Tests (Root-Level)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements.txt'
      - 'services/**/*.py'
      - 'cli/**/*.py'
      - 'infra/**/*.py'
      - '.github/workflows/ci-integration-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements.txt'
      - 'services/**/*.py'
      - 'cli/**/*.py'
      - 'infra/**/*.py'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Python Integration Tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: infra_pilot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-xdist

      - name: Run test suite
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infra_pilot_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ -v --cov=services --cov=cli --cov=infra --cov-report=xml:coverage.xml --cov-report=term-missing -n auto --ignore=tests/discord --ignore=tests/mobile || true

      - name: Run discord tests
        continue-on-error: true
        run: |
          pytest tests/discord/ -v --cov=services/discord-service --cov-append --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: integration-tests
          name: integration-tests

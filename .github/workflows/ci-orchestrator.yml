name: CI - Orchestrator Agent (Python)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/orchestrator-agent/**'
      - '.github/workflows/ci-orchestrator.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/orchestrator-agent/**'

permissions:
  contents: read

env:
  SERVICE_PATH: services/orchestrator-agent
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/orchestrator-agent

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run flake8
        run: |
          flake8 ${{ env.SERVICE_PATH }}/cogs ${{ env.SERVICE_PATH }}/main.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ${{ env.SERVICE_PATH }}/cogs ${{ env.SERVICE_PATH }}/main.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Check black formatting
        run: black --check ${{ env.SERVICE_PATH }}
      
      - name: Check import sorting
        run: isort --check-only ${{ env.SERVICE_PATH }}

  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gemini_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.SERVICE_PATH }}/requirements.txt
          pip install -r ${{ env.SERVICE_PATH }}/requirements-dev.txt
      
      - name: Run pytest
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infra_pilot_test
          REDIS_URL: redis://localhost:6379
        run: |
          cd ${{ env.SERVICE_PATH }}
          pytest -q
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ env.SERVICE_PATH }}/coverage.xml
          flags: orchestrator-agent
          name: orchestrator-agent

  security:
    runs-on: ubuntu-latest
    name: Security Checks
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install security tools
        run: |
          pip install bandit safety
      
      - name: Run Bandit security check
        run: bandit -r ${{ env.SERVICE_PATH }}/ -f json -o bandit-report.json || true
      
      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r ${{ env.SERVICE_PATH }}/requirements.txt
          safety check --json || true

  build:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    name: Build Service Image
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

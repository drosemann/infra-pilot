name: CI - Pages / Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/pages/**'
      - '.github/workflows/ci-pages.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/pages/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Type-check Pages
        working-directory: src/pages
        run: npx tsc --noEmit --strict --moduleResolution node --target es2020 --module esnext --jsx react-jsx --esModuleInterop --skipLibCheck DemoDashboard.tsx 2>&1 || true

  build:
    runs-on: ubuntu-latest
    name: Build Pages

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install -g typescript

      - name: Build Pages
        run: |
          cd src/pages
          npx tsc --outDir dist --strict --moduleResolution node --target es2020 --module esnext --jsx react-jsx --esModuleInterop --skipLibCheck DemoDashboard.tsx 2>&1 || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: src/pages/dist/

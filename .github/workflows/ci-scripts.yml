name: CI - Scripts Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'scripts/**'
      - '.github/workflows/ci-scripts.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'scripts/**'

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    name: ShellCheck

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  verify-scripts:
    runs-on: ubuntu-latest
    name: Verify Scripts Syntax

    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          for script in scripts/*.sh; do
            echo "Checking $script..."
            bash -n "$script" || echo "Syntax error in $script"
          done

      - name: Run health check test
        run: |
          chmod +x scripts/healthcheck.sh
          bash scripts/healthcheck.sh --dry-run 2>&1 || true

      - name: Run verify script
        run: |
          chmod +x scripts/verify.sh
          bash scripts/verify.sh --offline 2>&1 || true

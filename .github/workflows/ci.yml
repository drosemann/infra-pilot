name: Infra-pilot Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run unit tests
        run: |
          pytest -m unit --junitxml=reports/unit.xml
        env:
          TEST_ENV: ci
      - name: Upload coverage reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage_html/
      - name: Update README coverage badge
        run: |
          bash scripts/update_readme_coverage.sh
      - name: Run integration tests
        run: |
          pytest -m integration --junitxml=reports/integration.xml
        env:
          TEST_ENV: ci
      - name: Run e2e tests (mock provider)
        if: ${{ always() }}
        run: |
          pytest -m e2e --junitxml=reports/e2e.xml
        env:
          TEST_ENV: ci

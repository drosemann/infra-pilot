name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  management-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            services/management-panel/node_modules
            services/management-panel/packages
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (Management Panel)
        run: |
          cd services/management-panel
          npm ci

      - name: Lint (Management Panel)
        run: |
          cd services/management-panel
          npm run lint

      - name: Build (Management Panel)
        run: |
          cd services/management-panel
          npm run build

      - name: Install Playwright browsers
        run: |
          cd services/management-panel
          npm run playwright:install

      - name: Run Playwright tests (Demo gating enabled)
        run: |
          cd services/management-panel
          VITE_DEMO_FEATURE_ENABLED=true npm run test:playwright
        env:
          VITE_DEMO_FEATURE_ENABLED: true
      - name: Run Playwright tests (Demo gating disabled)
        run: |
          cd services/management-panel
          VITE_DEMO_FEATURE_ENABLED=false npm run test:playwright
        env:
          VITE_DEMO_FEATURE_ENABLED: false

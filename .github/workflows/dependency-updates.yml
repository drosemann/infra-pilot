name: Dependency Management

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    name: Python Dependency Audit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit root dependencies
        run: pip-audit -r requirements.txt || true
        continue-on-error: true

      - name: Audit integration service
        run: pip-audit -r services/integration-service/requirements.txt || true
        continue-on-error: true

      - name: Audit orchestrator agent
        run: pip-audit -r services/orchestrator-agent/requirements.txt || true
        continue-on-error: true

  npm-audit:
    runs-on: ubuntu-latest
    name: NPM Dependency Audit

    strategy:
      matrix:
        service:
          - management-panel
          - discord-service
          - mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run npm audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=high || true
        continue-on-error: true

  maven-dependency-check:
    runs-on: ubuntu-latest
    name: Maven Dependency Check

    strategy:
      matrix:
        dir: [services/service-core, servermanager]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Check for outdated deps
        working-directory: ${{ matrix.dir }}
        run: mvn versions:display-dependency-updates -B || true
        continue-on-error: true

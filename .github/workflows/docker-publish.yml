name: Docker Publish - All Services

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REGISTRY_DOCKERHUB: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: orchestrator-agent
            path: services/orchestrator-agent
          - name: management-panel
            path: services/management-panel
          - name: discord-service
            path: services/discord-service
          - name: service-core
            path: services/service-core
          - name: integration-service
            path: services/integration-service
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: secrets.DOCKERHUB_USERNAME != ''
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
            ${{ env.REGISTRY_DOCKERHUB }}/daanieldv/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:buildcache,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop'
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging cluster
        run: |
          # Configure kubeconfig
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          
          # Update deployments
          kubectl set image deployment/orchestrator-agent \
            orchestrator-agent=${{ env.REGISTRY }}/${{ github.repository }}/orchestrator-agent:sha-${{ github.sha }} \
            -n infra-pilot-staging --record
          
          # Monitor rollout
          kubectl rollout status deployment/orchestrator-agent -n infra-pilot-staging
        env:
          KUBECONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    environment:
      name: production
      url: https://your-domain.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production cluster
        run: |
          echo "Deploying release to production..."
          # Configure kubeconfig
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          
          # Update deployments
          kubectl set image deployment/orchestrator-agent \
            orchestrator-agent=${{ env.REGISTRY }}/${{ github.repository }}/orchestrator-agent:${{ github.ref_name }} \
            -n infra-pilot --record
          
          # Monitor rollout
          kubectl rollout status deployment/orchestrator-agent -n infra-pilot
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Production deployment completed for version ${{ github.ref_name }}
          draft: false
          prerelease: false

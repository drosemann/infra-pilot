name: Lint Services

on:
  push:
    branches: [ main, master, main-renovate ]
    paths:
      - 'services/**'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'services/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies for root (optional)
        run: |
          if [ -f package.json ]; then
            npm ci --silent || true
          fi

      - name: Install Python lint tools
        run: pip install flake8 black isort

      - name: Lint all services
        run: |
          chmod +x tools/lint-all.sh
          ./tools/lint-all.sh

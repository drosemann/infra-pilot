name: Build and Release Minecraft Plugin

on:
  push:
    paths:
      - 'services/service-core/**'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build JAR
        working-directory: services/service-core
        run: mvn -B clean package

      - name: Pick random release artwork
        shell: bash
        run: |
          IMG=$(find images-for-releases -maxdepth 1 -name '*.png' | shuf -n1)
          if [[ -n "$IMG" ]]; then
            cp "$IMG" branding/release-art.png
            echo "Selected: $IMG"
          else
            echo "No artwork found, skipping"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: plugin-${{ github.sha }}
          name: Minecraft Plugin ${{ github.sha }}
          body: |
            Automatisch gebaut aus Commit:
            ${{ github.sha }}
          files: |
            services/service-core/target/*.jar
            branding/release-art.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

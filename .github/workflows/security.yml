name: Security & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    name: CodeQL Analysis

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
          - java-kotlin

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  sast-python:
    runs-on: ubuntu-latest
    name: SAST - Python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install bandit semgrep

      - name: Run Bandit (all Python)
        run: |
          bandit -r services/cli services/integration-service services/orchestrator-agent cli infra -f json -o bandit-report.json || true
          bandit -r services/cli services/integration-service services/orchestrator-agent cli infra || true

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default
          auditOn: push
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning

    steps:
      - uses: actions/checkout@v4

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: '--only-verified --results=verified_secrets.json'
        continue-on-error: true

      - name: GitLeaks scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  dependency-scan:
    runs-on: ubuntu-latest
    name: Dependency Vulnerability Scan

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Safety check all Python deps
        run: |
          pip install safety
          safety scan -r requirements.txt -r services/integration-service/requirements.txt -r services/orchestrator-agent/requirements.txt || true
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: npm audit all services
        run: |
          for dir in services/management-panel services/discord-service mobile; do
            if [ -f "$dir/package.json" ]; then
              echo "=== Auditing $dir ==="
              cd "$dir"
              npm audit --audit-level=high || true
              cd ../..
            fi
          done
        continue-on-error: true

version: '3.8'

# Infra Pilot - Docker Compose Configuration
# 
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose down               # Stop and remove containers
#   docker-compose logs -f            # View logs
#   docker-compose ps                 # List running services

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: infra-pilot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infra_pilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-infra_pilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infra_pilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra-pilot-net

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: infra-pilot-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - infra-pilot-net

  # ============================================
  # Service Core (Java)
  # ============================================
  service-core:
    build:
      context: ./services/service-core
      dockerfile: Dockerfile
    container_name: infra-pilot-core
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-infra_pilot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-infra_pilot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infra-pilot-net
    # Uncomment to rebuild on each start
    # build:
    #   context: ./services/service-core
    #   dockerfile: Dockerfile
    #   cache_from:
    #     - service-core:latest

  # ============================================
  # Orchestrator Agent (Python)
  # ============================================
  orchestrator-agent:
    build:
      context: ./services/orchestrator-agent
      dockerfile: Dockerfile
    container_name: infra-pilot-orchestrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-infra_pilot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-infra_pilot}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infra-pilot-net
    # Uncomment to mount source for development
    # volumes:
    #   - ./services/orchestrator-agent:/app


  # ============================================
  # Integration Service (Python)
  # ============================================
  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    container_name: infra-pilot-integration
    environment:
      DASHBOARD_URL: ${DASHBOARD_URL:-http://management-panel:5173}
      DISCORD_API_URL: ${DISCORD_API_URL:-http://discord-service:3001}
      SERVICE_CORE_URL: ${SERVICE_CORE_URL:-http://service-core:8080}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL:-http://orchestrator-agent:8000}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      REDIS_URL: redis://redis:6379
      PYTHONUNBUFFERED: "1"
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator-agent:
        condition: service_started
      service-core:
        condition: service_started
    networks:
      - infra-pilot-net

  # ============================================
  # Discord Service (Node.js)
  # ============================================
  discord-service:
    build:
      context: ./services/discord-service
      dockerfile: Dockerfile
    container_name: infra-pilot-discord
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      PTERODACTYL_API_URL: ${PTERODACTYL_API_URL}
      PTERODACTYL_API_KEY: ${PTERODACTYL_API_KEY}
      ORCHESTRATOR_URL: http://orchestrator-agent:8000
      SERVICE_CORE_URL: http://service-core:8080
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - orchestrator-agent
      - service-core
    networks:
      - infra-pilot-net
    # Uncomment to mount source for development
    # volumes:
    #   - ./services/discord-service:/app
    #   - /app/node_modules

  # ============================================
  # Management Panel (React)
  # ============================================
  management-panel:
    build:
      context: ./services/management-panel
      dockerfile: Dockerfile
    container_name: infra-pilot-panel
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_ENVIRONMENT: ${VITE_ENVIRONMENT:-production}
    ports:
      - "5173:80"
    depends_on:
      - orchestrator-agent
      - service-core
    networks:
      - infra-pilot-net

  # ============================================
  # Monitoring - Prometheus (Optional)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: infra-pilot-prometheus
    environment:
      - PROMETHEUS_RETENTION=30d
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - infra-pilot-net
    profiles:
      - monitoring

  # ============================================
  # Monitoring - Grafana (Optional)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: infra-pilot-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - infra-pilot-net
    profiles:
      - monitoring

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

# ============================================
# Networks
# ============================================
networks:
  infra-pilot-net:
    driver: bridge

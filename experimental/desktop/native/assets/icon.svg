<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title" role="img">
  <title>Infra Pilot Logo</title>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="#15101e"/>
  <!-- IP monogram-inspired glyph with orbit ring -->
  <g transform="translate(20,18)">
    <circle cx="25" cy="25" r="22" fill="none" stroke="url(#g)" stroke-width="6"/>
    <path d="M20 40 L50 20" stroke="url(#g)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="36" fill="url(#g)">IP</text>
  </g>
  <!-- orbit ring -->
  <circle cx="60" cy="60" r="34" fill="none" stroke="url(#g)" stroke-width="8" opacity="0.75" />
</svg>
